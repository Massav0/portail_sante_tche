{% extends "base.html" %}
{% block title %}Nouveau menu — {{ patient.prenom }} {{ patient.nom }}{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Créer un menu pour {{ patient.prenom }} {{ patient.nom }}</h1>
  <a href="{{ url_for('main.fiche_patient', pid=patient.id) }}" class="btn-secondary">← Retour</a>
</div>
<div class="form-card" style="max-width:440px;margin:0 auto;">
  <form method="POST">
    <div class="form-group">
      <label>Semaine débutant le (lundi) *</label>
      <input type="date" name="semaine_debut" required>
    </div>
    <div class="form-group">
      <label>Titre du menu</label>
      <input type="text" name="titre" placeholder="Ex : Semaine détox, Régime équilibré...">
    </div>
    <div class="form-actions">
      <a href="{{ url_for('main.fiche_patient', pid=patient.id) }}" class="btn-secondary">Annuler</a>
      <button type="submit" class="btn-primary">Commencer →</button>
    </div>
  </form>
</div>
{% endblock %}
