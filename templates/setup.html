{% extends "base.html" %}
{% block title %}Créer un compte — Santé-Tché{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Créer un compte nutritionniste</h1>
  <p>{{ count }}/3 compte(s) existant(s)</p>
</div>
<div class="form-card" style="max-width:480px;margin:0 auto;">
  <form method="POST">
    <div class="form-row">
      <div class="form-group">
        <label>Prénom *</label>
        <input type="text" name="prenom" required placeholder="Marie">
      </div>
      <div class="form-group">
        <label>Nom *</label>
        <input type="text" name="nom" required placeholder="DUPONT">
      </div>
    </div>
    <div class="form-group">
      <label>Email *</label>
      <input type="email" name="email" required placeholder="marie@sante-tche.bj">
    </div>
    <div class="form-group">
      <label>Mot de passe *</label>
      <input type="password" name="password" required placeholder="Min. 6 caractères">
    </div>
    <div class="form-group">
      <label>Confirmer le mot de passe *</label>
      <input type="password" name="password2" required placeholder="Répétez le mot de passe">
    </div>
    <div class="form-actions">
      <a href="{{ url_for('auth.login') }}" class="btn-secondary">Annuler</a>
      <button type="submit" class="btn-primary">Créer le compte</button>
    </div>
  </form>
</div>
{% endblock %}
